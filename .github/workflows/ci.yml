name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Ant
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ant

      - name: Cache zserio download
        uses: actions/cache@v4
        with:
          path: build/download
          key: zserio-download-${{ hashFiles('build.xml') }}

      - name: Build bundled zserio.jar
        run: ant zserio_bundle.install

      - name: Run golden-file tests
        run: python3 tests/run_tests.py
